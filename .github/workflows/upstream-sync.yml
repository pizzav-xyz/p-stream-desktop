name: Sync with Upstream Repository

on:
  schedule:
    # Run daily at 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch: # Allow manual triggering

jobs:
  sync-with-upstream:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Git
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/p-stream/p-stream-desktop.git || true

      - name: Fetch upstream changes
        run: |
          git fetch upstream

      - name: Check for divergence
        id: check_divergence
        run: |
          LOCAL=$(git rev-parse HEAD)
          UPSTREAM=$(git rev-parse upstream/main)
          
          if [ "$LOCAL" = "$UPSTREAM" ]; then
            echo "Repository is up to date with upstream. No sync needed."
            echo "should_sync=false" >> $GITHUB_OUTPUT
          elif git merge-base --is-ancestor HEAD upstream/main; then
            echo "Repository is behind upstream. Need to sync."
            echo "should_sync=true" >> $GITHUB_OUTPUT
          else
            echo "Repository has diverged from upstream. Need to sync with potential conflicts."
            echo "should_sync=true" >> $GITHUB_OUTPUT
          fi

      - name: Sync with upstream and preserve adblock functionality
        if: steps.check_divergence.outputs.should_sync == 'true'
        run: |
          # Create a backup branch
          git checkout -b backup-$(date +%Y%m%d-%H%M%S)
          git checkout main
          
          # Fetch and merge upstream changes
          git fetch upstream
          git merge upstream/main
          
          # Re-apply adblock dependencies to package.json
          if ! grep -q '@ghostery/adblocker-electron' package.json; then
            # Extract dependencies section
            TEMP_FILE=$(mktemp)
            jq '.dependencies += {"@ghostery/adblocker-electron": "^5.7.2", "cross-fetch": "^4.0.0"}' package.json > "$TEMP_FILE" && mv "$TEMP_FILE" package.json
          fi
          
          # Ensure adblock imports are in main.js
          if ! grep -q 'ElectronBlocker' src/main/main.js; then
            # Add imports after the first require statement
            sed -i '2i\const { ElectronBlocker } = require("@ghostery/adblocker-electron");' src/main/main.js
            sed -i '3i\const fetch = require("cross-fetch");' src/main/main.js
          fi
          
          # Ensure adblock initialization is in main.js
          if ! grep -q 'adblocker = await ElectronBlocker' src/main/main.js; then
            # Insert adblock initialization after discordRPC.initialize(store);
            sed -i '/discordRPC.initialize(store);/a \ \ \ \n  // Initialize adblocker\n  try {\n    const adblocker = await ElectronBlocker.fromPrebuiltAdsAndTracking(fetch);\n    \n    // Enable blocking in the BrowserView session\n    if (mainBrowserView && mainBrowserView.webContents) {\n      adblocker.enableBlockingInSession(mainBrowserView.webContents.session);\n    }\n  } catch (error) {\n    console.error("Failed to initialize adblocker:", error);\n  }' src/main/main.js
          fi
          
          # Commit changes if any were made
          if ! git diff --no-patch --exit-code package.json src/main/main.js; then
            git config user.name 'github-actions[bot]' && git config user.email 'github-actions[bot]@users.noreply.github.com'
            git add package.json src/main/main.js
            git commit -m "Preserve adblock functionality after upstream sync"
          fi
          
          # Push changes to main branch
          git push origin main

      - name: Create Pull Request if conflicts exist
        if: steps.check_divergence.outputs.should_sync == 'true'
        run: |
          # Check if there are any merge conflicts that couldn't be resolved automatically
          if [[ $(git status --porcelain) ]]; then
            echo "There are uncommitted changes after merge, creating a PR..."
            
            # Create a new branch for the PR
            BRANCH_NAME="upstream-sync-$(date +%Y%m%d-%H%M%S)"
            git checkout -b $BRANCH_NAME
            
            # Add all changes and commit
            git add .
            git commit -m "Sync with upstream repository"
            
            # Push the branch
            git push origin $BRANCH_NAME
            
            # Create a PR using GitHub CLI
            gh pr create \
              --title "Sync with upstream repository" \
              --body "Automatic sync with upstream repository to incorporate recent changes." \
              --base main \
              --head $BRANCH_NAME
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Report no sync needed
        if: steps.check_divergence.outputs.should_sync == 'false'
        run: |
          echo "Repository is already in sync with upstream. No action taken."